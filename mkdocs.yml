site_name: keydaemon
site_description: A programmable keyboard/mouse automation daemon — clean Python API + CLI, with a kill key that always works.
site_url: https://mlmecham.github.io/keydeamon
repo_url: https://github.com/MLMecham/keydeamon
repo_name: MLMecham/keydeamon

theme:
  name: material
  logo: assets/logos/KeyDaemon_NoBack.png
  favicon: assets/logos/KeyDaemon_NoBack.png
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  palette:
    # Dark mode first — the daemon prefers the dark.
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

nav:
  - Home: index.md
  - CLI Guide: cli.md
  - Safety & Kill Keys: safety.md
  - Examples: examples.md
  - API Reference: API.md

watch:
  - src/keydaemon

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MLMecham
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/mitchell-mecham/

copyright: Copyright &copy; 2026 Mitchell Mecham
